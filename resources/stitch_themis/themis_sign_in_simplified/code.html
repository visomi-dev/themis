<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Themis - Sign In</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              surface: '#faf8ff',
              'surface-dim': '#cdd9ff',
              'surface-bright': '#ffffff',
              'surface-container-lowest': '#ffffff',
              'surface-container-low': '#f2f3ff',
              'surface-container': '#e9edff',
              'surface-container-high': '#e1e7ff',
              'surface-container-highest': '#d9e2ff',
              'on-surface': '#213156',
              'on-surface-variant': '#4e5e86',
              'inverse-surface': '#060e20',
              'inverse-on-surface': '#959cb5',
              outline: '#6a7aa3',
              'outline-variant': '#a1b1dd',
              'surface-tint': '#385ca9',
              primary: '#385ca9',
              'on-primary': '#f9f8ff',
              'primary-container': '#a8c0ff',
              'on-primary-container': '#063884',
              'inverse-primary': '#8aacff',
              secondary: '#3d6758',
              'on-secondary': '#e4fff2',
              'secondary-container': '#cdfbe8',
              'on-secondary-container': '#386253',
              tertiary: '#006d4e',
              'on-tertiary': '#e5fff0',
              'tertiary-container': '#8dfece',
              'on-tertiary-container': '#006146',
              error: '#ac3434',
              'on-error': '#fff7f6',
              'error-container': '#f56965',
              'on-error-container': '#65000b',
              'primary-fixed': '#a8c0ff',
              'primary-fixed-dim': '#92b2ff',
              'on-primary-fixed': '#00245d',
              'on-primary-fixed-variant': '#17428e',
              'secondary-fixed': '#cdfbe8',
              'secondary-fixed-dim': '#bfecd9',
              'on-secondary-fixed': '#264f42',
              'on-secondary-fixed-variant': '#436c5d',
              'tertiary-fixed': '#8dfece',
              'tertiary-fixed-dim': '#7fefc0',
              'on-tertiary-fixed': '#004d36',
              'on-tertiary-fixed-variant': '#006d4e',
              'primary-dim': '#2a509c',
              'secondary-dim': '#315b4d',
              'tertiary-dim': '#005f44',
              'error-dim': '#70030f',
              background: '#faf8ff',
              'on-background': '#213156',
              'surface-variant': '#d9e2ff',
            },
            borderRadius: {
              sm: '0.125rem',
              DEFAULT: '0.25rem',
              md: '0.375rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            fontFamily: {
              headline: ['Manrope'],
              body: ['Manrope'],
              label: ['Manrope'],
              display: ['Manrope'],
              mono: ['JetBrains Mono'],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 20;
        vertical-align: middle;
        font-size: 20px;
      }
      .ghost-border-bottom {
        border-bottom: 1px solid rgba(161, 177, 221, 0.2);
      }
      .ghost-border-bottom:focus-within {
        border-bottom: 1px solid #385ca9;
      }
    </style>
  </head>
  <body
    class="bg-surface font-body text-on-surface flex min-h-screen flex-col items-center justify-center p-6 antialiased"
  >
    <!-- Themis Logo Header -->
    <header class="mb-8 text-center">
      <h1 class="font-headline text-on-background text-lg font-extrabold tracking-tight uppercase opacity-80">
        Themis
      </h1>
    </header>
    <!-- Auth Card -->
    <main
      class="bg-surface-container-lowest border-outline-variant/10 relative w-full max-w-md overflow-hidden border p-10 shadow-sm"
    >
      <section class="mb-8">
        <h2 class="font-headline text-on-surface mb-2 text-2xl font-bold tracking-tight">Sign in</h2>
        <p class="text-on-surface-variant text-sm leading-relaxed font-medium">
          Enter your details to access your workspace.
        </p>
      </section>
      <!-- Login Form -->
      <form class="space-y-6">
        <!-- Email Field -->
        <div class="space-y-1.5">
          <label class="text-on-surface block text-sm font-semibold" for="email"> Email </label>
          <div class="ghost-border-bottom transition-all duration-200">
            <input
              class="placeholder:text-outline-variant/50 w-full border-none bg-transparent px-0 py-2 text-sm focus:ring-0"
              id="email"
              name="email"
              placeholder="name@organization.com"
              required=""
              type="email"
            />
          </div>
        </div>
        <!-- Password Field -->
        <div class="space-y-1.5">
          <label class="text-on-surface block text-sm font-semibold" for="password"> Password </label>
          <div class="ghost-border-bottom flex items-center transition-all duration-200">
            <input
              class="placeholder:text-outline-variant/50 w-full border-none bg-transparent px-0 py-2 text-sm focus:ring-0"
              id="password"
              name="password"
              placeholder="••••••••"
              required=""
              type="password"
            />
            <button class="text-outline-variant hover:text-primary px-2 transition-colors" type="button">
              <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
            </button>
          </div>
        </div>
        <!-- Options -->
        <div class="flex items-center justify-between text-xs font-medium tracking-tight">
          <label class="group flex cursor-pointer items-center space-x-2">
            <input
              class="border-outline-variant text-primary focus:ring-primary-container h-3.5 w-3.5 rounded-none"
              type="checkbox"
            />
            <span class="text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
          </label>
          <a class="text-primary hover:text-primary-dim transition-colors hover:underline" href="#">
            Forgot Password?
          </a>
        </div>
        <!-- Action Button -->
        <button
          class="bg-primary hover:bg-primary-dim text-on-primary group flex w-full items-center justify-center space-x-2 rounded py-3.5 text-sm font-semibold transition-all"
          type="submit"
        >
          <span>Sign in</span>
          <span
            class="material-symbols-outlined transform transition-transform group-hover:translate-x-1"
            data-icon="arrow_forward"
            >arrow_forward</span
          >
        </button>
      </form>
      <!-- Signup Link -->
      <footer class="border-outline-variant/10 mt-10 border-t pt-6 text-center">
        <p class="text-on-surface-variant text-sm">
          New to Themis?
          <a class="text-primary ml-1 font-semibold hover:underline" href="#">Create an account</a>
        </p>
      </footer>
    </main>
  </body>
</html>
