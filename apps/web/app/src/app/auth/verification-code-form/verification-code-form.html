@if (errorMessage()) {
  <p-message class="mt-4 block" severity="error">{{ errorMessage() }}</p-message>
}
@if (statusMessage()) {
  <p-message class="mt-4 block" severity="success">{{ statusMessage() }}</p-message>
}

<form [formGroup]="form" (ngSubmit)="submit()" class="mt-4 grid gap-6" novalidate>
  <app-form-field
    fieldId="verification-pin"
    label="Verification code"
    i18n-label="@@verificationCodeLabel"
    [error]="pinError()"
    help="Enter the 6-digit code from your email."
    i18n-help="@@verificationCodeHelp"
  >
    <p-inputotp formControlName="pin" inputId="verification-pin" [length]="6" />
  </app-form-field>

  <div class="flex flex-wrap items-center gap-3">
    <button pButton type="submit" [disabled]="submitting()" i18n="@@verificationCodeSubmitButton">
      Verify and continue
    </button>
    <button
      pButton
      type="button"
      severity="secondary"
      [text]="true"
      (click)="resend.emit()"
      i18n="@@verificationCodeResendButton"
    >
      Resend code
    </button>
  </div>
</form>
