<main class="auth-page-shell relative px-4 py-4 md:px-8 md:py-6">
  <div class="absolute top-4 right-4 flex items-center gap-6 md:top-6 md:right-8">
    <app-language-switcher />
    <app-theme-switcher />
  </div>

  <section
    class="mx-auto grid min-h-[calc(100dvh-2rem)] max-w-6xl content-center gap-10 md:min-h-[calc(100dvh-3rem)] lg:grid-cols-[1.1fr_0.9fr] lg:items-center"
  >
    <div class="space-y-6">
      <div>
        <app-logo variant="wordmark" />
        <p class="text-on-surface-variant mt-2 text-sm" i18n="@@forgottenPasswordEyebrow">
          AI-integrated technical access layer
        </p>
      </div>

      <div class="hidden space-y-5 lg:block">
        <p
          class="text-on-surface-variant text-[11px] font-black tracking-[0.22em] uppercase"
          i18n="@@forgottenPasswordHeroKicker"
        >
          Account recovery
        </p>

        <h1
          class="font-display text-on-surface max-w-xl text-5xl leading-[0.94] font-extrabold tracking-tighter xl:text-6xl"
          i18n="@@forgottenPasswordHeroTitle"
        >
          Reset your access.
        </h1>
      </div>
    </div>

    <section class="auth-panel w-full max-w-xl rounded-xl p-6 md:p-8 lg:justify-self-end">
      <header>
        <p
          class="text-on-surface-variant text-[11px] font-black tracking-[0.22em] uppercase"
          i18n="@@forgottenPasswordPanelKicker"
        >
          Account access
        </p>

        <h2 class="font-display text-on-surface mt-2 mb-4 text-4xl leading-tight font-extrabold tracking-tight">
          <ng-container i18n="@@forgottenPasswordPanelTitle">Reset password</ng-container>
        </h2>
      </header>

      @if (errorMessage()) {
        <p-message class="mt-4 block" severity="error">{{ errorMessage() }}</p-message>
      }
      @if (successMessage()) {
        <p-message class="mt-4 block" severity="success">{{ successMessage() }}</p-message>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="mt-4 grid gap-5" novalidate>
        <app-form-field
          fieldId="forgotten-password-email"
          label="Email"
          i18n-label="@@forgottenPasswordEmailLabel"
          [error]="emailError()"
        >
          <input
            id="forgotten-password-email"
            pInputText
            formControlName="email"
            autocomplete="email"
            placeholder="name@organization.com"
            i18n-placeholder="@@forgottenPasswordEmailPlaceholder"
            class="w-full"
          />
        </app-form-field>

        <button class="mt-2" pButton type="submit" [disabled]="submitting()" i18n="@@forgottenPasswordSubmitButton">
          Send reset link
        </button>
      </form>

      <footer class="text-on-surface-variant mt-6 text-sm">
        <a
          class="text-primary font-semibold no-underline hover:underline"
          [routerLink]="signInUrl"
          i18n="@@forgottenPasswordFooterLink"
        >
          Back to sign in
        </a>
      </footer>
    </section>
  </section>
</main>
