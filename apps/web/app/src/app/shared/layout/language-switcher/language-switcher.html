<div class="text-on-surface-variant flex items-center gap-4 font-sans text-xs font-black tracking-widest uppercase">
  <a
    [href]="localeUrl('en')"
    hreflang="en"
    [attr.aria-current]="currentLocale() === 'en' ? 'page' : null"
    [attr.aria-label]="localeLabel('en')"
    class="hover:text-primary no-underline"
    [class.text-on-surface]="currentLocale() === 'en'"
    [class.font-extrabold]="currentLocale() === 'en'"
    >EN</a
  >
  <span class="opacity-30">/</span>
  <a
    [href]="localeUrl('es')"
    hreflang="es"
    [attr.aria-current]="currentLocale() === 'es' ? 'page' : null"
    [attr.aria-label]="localeLabel('es')"
    class="hover:text-primary no-underline"
    [class.text-on-surface]="currentLocale() === 'es'"
    [class.font-extrabold]="currentLocale() === 'es'"
    >ES</a
  >
</div>
