<button
  type="button"
  class="text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface dark:hover:bg-surface-container-high flex h-9 items-center gap-2 rounded-sm px-3 text-xs font-black tracking-widest uppercase transition-colors"
  aria-label="Change language"
  i18n-aria-label="@@languageSwitcherChangeLanguage"
  (click)="languageMenu.toggle($event)"
>
  <i class="pi pi-globe text-base"></i>
  <span>{{ currentLocaleLabel() }}</span>
  <i class="pi pi-angle-down text-xs"></i>
</button>

<p-menu #languageMenu [model]="localeItems()" [popup]="true" appendTo="body" />
