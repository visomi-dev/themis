<aside
  class="bg-surface-container hidden min-h-dvh w-60 shrink-0 flex-col lg:flex"
>
  <a
    class="font-display text-on-surface focus:outline-primary px-6 pt-8 pb-9 text-xl font-bold tracking-[-0.01em] no-underline focus:outline-2 focus:outline-offset-2"
    [routerLink]="DASHBOARD_URL"
  >
    themis<span class="text-primary">.</span>
  </a>

  <nav class="flex flex-col gap-7 px-3" aria-label="Primary navigation" i18n-aria-label="@@layoutSidebarAriaLabel">
    @for (section of navSections; track section.label) {
      <div class="flex flex-col gap-1">
        <p class="text-on-surface-variant px-2 text-[0.6875rem] font-semibold tracking-[0.08em] uppercase">
          {{ section.label }}
        </p>

        @for (item of section.items; track item.url) {
          <a
            class="text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface dark:hover:bg-surface-container-high relative flex items-center gap-2.5 rounded-sm px-2 py-2.25 text-sm font-medium no-underline transition-colors duration-100"
            routerLinkActive="bg-surface-container-lowest text-primary shadow-panel before:absolute before:top-1.5 before:bottom-1.5 before:left-0 before:w-0.5 before:rounded-r-sm before:bg-primary before:content-[''] dark:bg-surface-container-high"
            [routerLink]="item.url"
            [routerLinkActiveOptions]="{ exact: item.exact }"
          >
            <i class="{{ item.icon }} w-4.5 shrink-0 text-lg opacity-70"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>
    }
  </nav>

  <div class="border-outline-variant/25 mt-auto border-t p-3">
    <div class="flex items-center gap-2.5 rounded-sm px-2 py-2.5">
      <div
        class="bg-primary text-on-primary flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-xs font-semibold"
      >
        {{ userInitials() }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-on-surface truncate text-[0.8125rem] font-semibold">{{ user()?.email }}</p>
        <p class="text-on-surface-variant text-[0.6875rem]" i18n="@@layoutSignedInStatus">Signed in</p>
      </div>
    </div>
  </div>
</aside>
