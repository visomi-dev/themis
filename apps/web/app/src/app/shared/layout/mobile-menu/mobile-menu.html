<div class="bg-on-surface/40 fixed inset-0 z-50 flex">
  <button
    type="button"
    class="absolute inset-0 cursor-default"
    aria-label="Close navigation"
    i18n-aria-label="@@layoutCloseNavigation"
    (click)="closeMenu()"
  ></button>

  <aside
    class="bg-surface-container-lowest text-on-surface shadow-panel relative z-10 flex min-h-dvh w-full max-w-120 flex-col p-6"
  >
    <div class="mb-12 flex items-center justify-between gap-6">
      <h2 class="font-display text-on-surface text-3xl font-bold" i18n="@@layoutMobileNavigationTitle">
        Navigation
      </h2>
      <button
        type="button"
        class="text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface dark:hover:bg-surface-container-high flex h-9 w-9 items-center justify-center rounded-sm transition-colors"
        aria-label="Close navigation"
        i18n-aria-label="@@layoutCloseNavigation"
        (click)="closeMenu()"
      >
        <i class="pi pi-times text-lg"></i>
      </button>
    </div>

    <a
      class="font-display text-on-surface mb-12 flex items-center gap-4 text-xl font-bold tracking-[-0.01em] no-underline"
      [routerLink]="DASHBOARD_URL"
      (click)="closeMenu()"
    >
      <span
        class="bg-primary text-on-primary flex h-12 w-12 items-center justify-center rounded-sm text-2xl font-bold"
        >T</span
      >
      <span>Themis</span>
    </a>

    <nav class="flex flex-col gap-7" aria-label="Primary navigation" i18n-aria-label="@@layoutSidebarAriaLabel">
      @for (section of navSections; track section.label) {
        <div class="flex flex-col gap-1">
          <p class="text-on-surface-variant px-2 text-sm font-semibold tracking-[0.08em] uppercase">
            {{ section.label }}
          </p>

          @for (item of section.items; track item.url) {
            <a
              class="text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface dark:hover:bg-surface-container-high relative flex items-center gap-3 rounded-sm px-2 py-2.5 text-base font-medium no-underline transition-colors duration-100"
              routerLinkActive="bg-surface-container-low text-primary before:absolute before:top-1.5 before:bottom-1.5 before:left-0 before:w-0.5 before:rounded-r-sm before:bg-primary before:content-['']"
              [routerLink]="item.url"
              [routerLinkActiveOptions]="{ exact: item.exact }"
              (click)="closeMenu()"
            >
              <i class="{{ item.icon }} w-4.5 shrink-0 text-lg opacity-70"></i>
              <span>{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="bg-surface-container mt-auto flex items-center justify-between gap-4 rounded-sm p-3">
      <button
        type="button"
        class="border-outline-variant/50 text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface dark:hover:bg-surface-container-high flex h-9 w-9 items-center justify-center rounded-sm border transition-colors"
        (click)="toggleTheme()"
      >
        <span class="sr-only" i18n="@@themeSwitcherToggleTheme">Toggle theme</span>
        <i class="pi text-base" [class.pi-moon]="!isDark()" [class.pi-sun]="isDark()"></i>
      </button>
      <button
        type="button"
        class="border-outline-variant/50 text-on-surface hover:bg-surface-container-low dark:hover:bg-surface-container-high flex h-9 items-center gap-2 rounded-sm border px-4 text-sm font-semibold transition-colors"
        [disabled]="signingOut()"
        (click)="signOut()"
      >
        <i class="pi pi-sign-out text-base"></i>
        <span i18n="@@layoutSignOutLabel">Sign out</span>
      </button>
    </div>
  </aside>
</div>
