<section class="mx-auto flex max-w-3xl flex-col gap-8">
  <header>
    <div class="flex items-center gap-3 text-sm">
      <a [routerLink]="projectsUrl" class="text-primary font-semibold no-underline hover:underline">Projects</a>
      <span class="text-outline-variant">/</span>
      <span class="text-on-surface-variant">New project</span>
    </div>

    <h1 class="text-on-surface font-heading mt-6 text-4xl font-extrabold tracking-tight">New project</h1>
  </header>

  @if (errorMessage()) {
    <p-message severity="error">{{ errorMessage() }}</p-message>
  }

  <section class="bg-surface-container-lowest shadow-panel dark:bg-surface-container rounded-sm p-6">
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-6" novalidate>
      <div>
        <label class="text-on-surface-variant mb-2 block text-sm font-semibold" for="project-name">Project name</label>
        <input
          id="project-name"
          pInputText
          type="text"
          formControlName="name"
          placeholder="My application"
          class="w-full"
        />
      </div>

      <div>
        <label class="text-on-surface-variant mb-2 block text-sm font-semibold" for="project-summary">
          Summary <span class="text-on-surface-variant font-normal">(optional)</span>
        </label>
        <textarea
          id="project-summary"
          pInputText
          formControlName="summary"
          placeholder="A short description of the project"
          class="w-full"
          rows="3"
        ></textarea>
      </div>

      <div class="flex flex-col gap-3 sm:flex-row sm:justify-end">
        <a [routerLink]="projectsUrl" pButton type="button" severity="secondary" [outlined]="true">Cancel</a>
        <button pButton type="submit" [disabled]="submitting()">Create project</button>
      </div>
    </form>
  </section>
</section>
